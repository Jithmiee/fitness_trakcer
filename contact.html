<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | FitTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-theme">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand text-primary fw-bold fs-3" href="index.html">FIT<span class="text-white">TRACK</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="programs.html">Programs</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="membership.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login / Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="py-5 text-center">
        <div class="container">
            <h1 class="display-3 fw-bold mt-5 text-white">GET IN <span class="text-primary">TOUCH</span></h1>
            <p class="lead text-secondary">We'd love to hear from you. Drop us a message below.</p>
        </div>
    </header>

    <section class="pb-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card p-4 bg-dark">
                        <form action="#" method="GET">
                            <div class="mb-3">
                                <label class="form-label text-white">Name</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">Email Address</label>
                                <input type="email" class="form-control bg-dark text-white border-secondary" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-white">Message</label>
                                <textarea class="form-control bg-dark text-white border-secondary" rows="5" required></textarea>
                            </div>
                            <button type="button" class="btn btn-primary w-100" onclick="alert('Static HTML Demo: Message sent!')">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="text-center text-lg-start bg-dark mt-auto border-top border-secondary pt-4">
        <div class="container p-4">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h5 class="text-uppercase text-primary fw-bold">FITTRACK</h5>
                    <p class="text-secondary">Transforming lives through fitness and dynamically driven static fallbacks.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
